<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Thai Election 2026">
    <title>Thai Election 2026</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <main class="story-scroll">
        <section id="landingSection" class="story-section landing-section">
            <div class="section-inner landing-inner">
                <h1 class="landing-title">การเลือกตั้ง '69 โกงจริงหรือไม่</h1>
                <div>test</div>
                <p id="landingRotator" class="landing-rotator">ข่าวลือมากมาย</p>
                <a class="scroll-hint" href="#benfordSection">เลื่อนลงเพื่อสำรวจ</a>
            </div>
        </section>

        <section id="benfordSection" class="story-section benford-section">
            <div class="section-inner">
                <header class="section-header">
                    <h2>Benford's Law Check</h2>
                    <p>เปรียบเทียบความถี่เลขหลักแรกของผลคะแนนกับค่าที่คาดหวัง</p>
                </header>

                <div class="benford-toolbar">
                    <label for="benfordPartyFilter">พรรค</label>
                    <select id="benfordPartyFilter"></select>
                </div>

                <div class="benford-chart-wrap">
                    <div id="benfordChart" class="benford-chart" role="img" aria-label="Benford chart by leading digit"></div>
                </div>
            </div>
        </section>

        <section id="dashboardSection" class="story-section dashboard-section">
            <div class="section-inner dashboard-layout">
                <aside class="dashboard-left">
                    <section class="panel status-card" id="statusCard" aria-live="polite">Loading election map data...</section>

                    <section class="panel control-panel">
                        <h3>ข้อมูลที่ต้องการดู</h3>
                        <div id="metricSelector" class="metric-selector"></div>
                    </section>

                    <section class="panel control-panel">
                        <h3>ภูมิภาค</h3>
                        <select id="regionFilter"></select>
                    </section>

                    <section class="panel" id="topNPanel">
                        <div class="top-n-header">
                            <h3>Top <span id="topNValueLabel">5</span></h3>
                            <label for="topNInput" class="sr-only">Top N value</label>
                            <input id="topNInput" type="number" min="1" max="20" value="5">
                        </div>
                        <ol id="topNList" class="top-n-list"></ol>
                    </section>
                </aside>

                <section class="dashboard-map panel">
                    <h3>Constituency Tile Grid</h3>
                    <div id="tileGridMap" class="tile-grid-map" role="img" aria-label="Thailand constituency tile grid map"></div>
                    <div id="partyLegend" class="party-legend"></div>
                </section>

                <aside class="dashboard-right panel">
                    <h3>Constituencies</h3>
                    <label for="constituencySearch" class="sr-only">Search constituencies</label>
                    <input id="constituencySearch" type="search" placeholder="ค้นหาจังหวัดหรือเขต">
                    <div id="constituencyList" class="constituency-list"></div>
                </aside>
            </div>
        </section>
    </main>

    <div id="detailPopup" class="detail-popup" hidden>
        <div class="detail-popup-backdrop" data-close-popup="true"></div>
        <div class="detail-popup-card" role="dialog" aria-modal="true" aria-labelledby="popupTitle">
            <button id="popupClose" class="popup-close" type="button">✕</button>
            <h2 id="popupTitle">รายละเอียดเขตเลือกตั้ง</h2>
            <p id="popupSubtitle" class="popup-subtitle">-</p>
        </div>
    </div>

    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="index.js"></script>
</body>
</html>
