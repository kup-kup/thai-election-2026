<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Thai Election 2026">
    <title>Thai Election 2026</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <main class="container">
        <header class="page-header">
            <h1>Thailand Election Results (Tile Grid)</h1>
            <p class="subtitle">Constituency winners visualized using <code>src/tile_grid.csv</code></p>
        </header>

        <section class="status-card" id="statusCard" aria-live="polite">
            Loading election map data...
        </section>

        <section class="summary-panel" id="summaryPanel">
            <h2>Party Summary</h2>
            <div id="partyLegend" class="party-legend"></div>
        </section>

        <section class="map-panel">
            <h2>Constituency Tile Grid</h2>
            <div id="tileGridMap" class="tile-grid-map" role="img" aria-label="Thailand constituency tile grid map"></div>
        </section>
    </main>

    <script src="index.js"></script>
</body>
</html>
